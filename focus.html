<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode | Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .focus-container { text-align: center; background: var(--card-bg); padding: 50px 30px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow); max-width: 500px; margin: 0 auto; }
        .timer-circle { 
            width: 250px; height: 250px; margin: 0 auto 30px; border-radius: 50%; 
            border: 8px solid rgba(0, 242, 254, 0.1); display: flex; justify-content: center; align-items: center; 
            box-shadow: inset 0 0 30px rgba(0, 242, 254, 0.1), 0 0 30px rgba(0, 242, 254, 0.1);
            position: relative;
        }
        .timer-display { font-size: 60px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 15px rgba(0,242,254,0.4); }
        .timer-controls button { margin: 5px; padding: 12px 25px; font-size: 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; color: #fff; min-width: 120px; }
        .btn-start { background: #10b981; } .btn-start:hover { box-shadow: 0 0 15px #10b981; transform: translateY(-2px); }
        .btn-pause { background: #f59e0b; } .btn-pause:hover { box-shadow: 0 0 15px #f59e0b; transform: translateY(-2px); }
        .btn-reset { background: #ef4444; } .btn-reset:hover { box-shadow: 0 0 15px #ef4444; transform: translateY(-2px); }
        .status-text { margin-bottom: 20px; color: var(--text-muted); font-size: 18px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-code"></i> Command Center</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="typing.html" class="nav-item"><i class="fa-solid fa-keyboard"></i> Typing Tool</a></li>
                <li><a href="tracker.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i> Tracker</a></li>
                <li><a href="focus.html" class="nav-item active"><i class="fa-solid fa-stopwatch"></i> Focus Mode</a></li>
                <li><a href="quiz.html" class="nav-item"><i class="fa-solid fa-brain"></i> Quiz</a></li>
                <li><a href="notes.html" class="nav-item"><i class="fa-solid fa-book"></i> Notes</a></li>
                <li><a href="todo.html" class="nav-item"><i class="fa-solid fa-list-check"></i> To-Do</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <nav class="top-navbar">
                <button class="menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <div class="search-bar" style="color: var(--text-muted);"><i class="fa-solid fa-stopwatch"></i> <span style="font-size: 14px; margin-left: 5px;">Pomodoro Timer</span></div>
                <div class="nav-actions"><button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button></div>
            </nav>

            <div class="dashboard-content">
                <div class="welcome-section" style="text-align: center;">
                    <h1>Deep Focus Mode ⏱️</h1>
                    <p>25 मिनट तक डिस्ट्रैक्शन फ्री पढ़ाई करें।</p>
                </div>

                <div class="focus-container">
                    <div class="status-text" id="statusText">रेडी टू फोकस?</div>
                    
                    <div class="timer-circle" id="timerCircle">
                        <div class="timer-display" id="timeDisplay">25:00</div>
                    </div>
                    
                    <div class="timer-controls">
                        <button class="btn-start" onclick="startTimer()"><i class="fa-solid fa-play"></i> Start</button>
                        <button class="btn-pause" onclick="pauseTimer()"><i class="fa-solid fa-pause"></i> Pause</button>
                        <button class="btn-reset" onclick="resetTimer()"><i class="fa-solid fa-rotate-right"></i> Reset</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        let timeLeft = 25 * 60; // 25 Minutes in seconds
        let timerInterval;
        let isRunning = false;
        
        const timeDisplay = document.getElementById('timeDisplay');
        const statusText = document.getElementById('statusText');
        const timerCircle = document.getElementById('timerCircle');

        function updateDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timeDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                statusText.innerText = "फोकस मोड ऑन है... पढ़ते रहें!";
                statusText.style.color = "#10b981";
                timerCircle.style.borderColor = "rgba(16, 185, 129, 0.5)";
                timerCircle.style.boxShadow = "0 0 30px rgba(16, 185, 129, 0.2)";
                
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerInterval);
                        isRunning = false;
                        statusText.innerText = "सेशन पूरा हुआ! 5 मिनट का ब्रेक लें।";
                        statusText.style.color = "#00f2fe";
                        alert("फोकस सेशन कम्पलीट! शानदार काम विशाल।");
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                statusText.innerText = "टाइमर पॉज्ड है। जल्दी वापस आएं!";
                statusText.style.color = "#f59e0b";
                timerCircle.style.borderColor = "rgba(245, 158, 11, 0.5)";
                timerCircle.style.boxShadow = "0 0 30px rgba(245, 158, 11, 0.2)";
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = 25 * 60;
            updateDisplay();
            statusText.innerText = "रेडी टू फोकस?";
            statusText.style.color = "var(--text-muted)";
            timerCircle.style.borderColor = "rgba(0, 242, 254, 0.1)";
            timerCircle.style.boxShadow = "inset 0 0 30px rgba(0, 242, 254, 0.1), 0 0 30px rgba(0, 242, 254, 0.1)";
        }

        updateDisplay(); // Initial call
    </script>
</body>
</html>
