<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Matrix - Anudeshak 2026</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 20px; margin: 0; }
        h1 { letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 10px #00ff41; margin-bottom: 5px; }
        #today-date { font-size: 1.5rem; color: #fff; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 15px #ffffff; background: rgba(255, 255, 255, 0.1); display: inline-block; padding: 10px 20px; border: 1px solid #fff; border-radius: 5px; }
        .info-panel { margin-bottom: 30px; font-size: 0.9rem; color: #ccc; }
        #calendar-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 800px; margin: 0 auto; padding: 20px; border: 1px dashed #00ff41; background: rgba(0, 20, 0, 0.5); }
        .day-box { width: 40px; height: 40px; border: 1px solid #333; background-color: #111; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .day-box:hover { border-color: #00ff41; transform: scale(1.1); }
        .present { background-color: #00ff41; color: #000; border-color: #00ff41; box-shadow: 0 0 10px #00ff41; }
        .absent { background-color: #ff0000; color: #fff; border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        button.back-btn { margin-top: 30px; padding: 12px 25px; background: transparent; color: #00ff41; border: 2px solid #00ff41; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button.back-btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
    </style>
</head>
<body>

    <h1>TARGET: 23 AUG 2026</h1>
    <div id="today-date">[ LOADING DATE... ]</div>
    <div class="info-panel">
        [ CLICK ONCE: <span style="color:#00ff41;">PRESENT (GREEN)</span> ] | [ CLICK TWICE: <span style="color:#ff0000;">ABSENT (RED)</span> ]
    </div>

    <div id="calendar-grid"></div>

    <button class="back-btn" onclick="window.location.href='index.html'">🔙 BACK TO MAIN DASHBOARD</button>

<script>
    // Self-executing safe block
    (function() {
        try {
            // 1. DATE LOGIC
            const todayElement = document.getElementById('today-date');
            if(todayElement) {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const currentDate = new Date().toLocaleDateString('en-IN', options);
                todayElement.innerText = "📅 TODAY: " + currentDate.toUpperCase();
            }

            // 2. MATRIX LOGIC
            const totalDays = 153; 
            const grid = document.getElementById('calendar-grid');
            
            // Safe Storage - Changed variable name to reset old bugs
            let attendanceData = {};
            try {
                let savedData = localStorage.getItem('anudeshak_v2');
                if(savedData) { attendanceData = JSON.parse(savedData); }
            } catch(e) { console.log("Memory reset done."); attendanceData = {}; }

            if(grid) {
                for (let i = 1; i <= totalDays; i++) {
                    let box = document.createElement('div');
                    box.className = 'day-box';
                    box.innerText = i;
                    box.dataset.day = i;

                    if (attendanceData[i] === 'present') { box.classList.add('present'); } 
                    else if (attendanceData[i] === 'absent') { box.classList.add('absent'); }

                    box.addEventListener('click', function() {
                        let dayNum = this.dataset.day;
                        if (this.classList.contains('present')) {
                            this.classList.remove('present'); 
                            this.classList.add('absent');
                            attendanceData[dayNum] = 'absent';
                        } else if (this.classList.contains('absent')) {
                            this.classList.remove('absent'); 
                            delete attendanceData[dayNum];
                        } else {
                            this.classList.add('present'); 
                            attendanceData[dayNum] = 'present';
                        }
                        localStorage.setItem('anudeshak_v2', JSON.stringify(attendanceData));
                    });
                    grid.appendChild(box);
                }
            }
        } catch (error) {
            console.error("Script failed:", error);
            document.getElementById('today-date').innerText = "SYSTEM ERROR: PLEASE REFRESH";
        }
    })();
</script>

</body>
</html>
