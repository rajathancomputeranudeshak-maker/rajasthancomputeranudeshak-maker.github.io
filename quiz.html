<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anudeshak Exam Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background: #0b0f19; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: rgba(255, 255, 255, 0.05); border: 2px solid #00f2fe; border-radius: 15px; padding: 40px; width: 90%; max-width: 700px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); backdrop-filter: blur(10px); }
        .header-bar { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0, 242, 254, 0.3); padding-bottom: 15px; margin-bottom: 25px; }
        .status-box { font-size: 1.2rem; font-weight: bold; color: #00f2fe; }
        #timer { color: #ff004c; text-shadow: 0 0 10px rgba(255,0,76,0.5); }
        #question-text { font-size: 1.5rem; margin-bottom: 30px; line-height: 1.4; }
        .options-grid { display: grid; gap: 15px; }
        .option-btn { background: rgba(0, 0, 0, 0.5); border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-align: left; }
        .option-btn:hover { background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; }
        .option-btn.correct { background: rgba(0, 255, 65, 0.2); border-color: #00ff41; color: #00ff41; }
        .option-btn.wrong { background: rgba(255, 0, 76, 0.2); border-color: #ff004c; color: #ff004c; }
        #next-btn { background: #00f2fe; color: #0b0f19; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; margin-top: 30px; cursor: pointer; display: none; width: 100%; transition: 0.3s; text-transform: uppercase; }
        #next-btn:hover { box-shadow: 0 0 20px #00f2fe; }
        .result-screen { text-align: center; display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #00f2fe; display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; margin: 0 auto 20px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); }
        .back-link { display: inline-block; margin-top: 30px; color: #aaa; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .back-link:hover { color: #00f2fe; border-color: #00f2fe; }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <div class="header-bar">
            <div class="status-box">Q: <span id="q-num">1</span>/5</div>
            <div class="status-box">⏱️ <span id="timer">00:30</span></div>
            <div class="status-box">Score: <span id="live-score">0</span></div>
        </div>

        <div id="question-text">प्रश्न लोड हो रहा है...</div>
        
        <div class="options-grid" id="options-area">
            </div>

        <button id="next-btn" onclick="nextQuestion()">Next Question ❯</button>
    </div>

    <div class="quiz-container result-screen" id="result-box">
        <h2 style="color: #00f2fe; margin-top: 0;">Exam Terminated</h2>
        <div class="score-circle" id="final-score">0/5</div>
        <p style="font-size: 1.2rem; color: #ccc;" id="feedback-msg">Calculating performance...</p>
        <button id="next-btn" style="display: block;" onclick="window.location.reload()">🔄 Restart Simulation</button>
        <a href="index.html" class="back-link">← Back to Command Center</a>
    </div>

<script>
    // Advance Anudeshak Level Questions
    const quizData = [
        {
            question: "OSI Model में Routing का कार्य कौनसी Layer करती है?",
            options: ["Data Link Layer", "Network Layer", "Transport Layer", "Session Layer"],
            answer: 1 // Index of correct option (Network Layer)
        },
        {
            question: "C++ में Memory Leak को रोकने के लिए किस Operator का उपयोग किया जाता है?",
            options: ["malloc()", "free()", "delete", "remove"],
            answer: 2 // delete
        },
        {
            question: "DBMS में 'ACID' properties में 'I' का क्या अर्थ है?",
            options: ["Integration", "Isolation", "Integrity", "Iteration"],
            answer: 1 // Isolation
        },
        {
            question: "IPv4 Address कितने Bits का होता है?",
            options: ["16 Bits", "32 Bits", "64 Bits", "128 Bits"],
            answer: 1 // 32 Bits
        },
        {
            question: "Data Structure में LIFO सिद्धांत पर कौन काम करता है?",
            options: ["Queue", "Tree", "Stack", "Graph"],
            answer: 2 // Stack
        }
    ];

    let currentQ = 0;
    let score = 0;
    let timeLeft = 30;
    let timerInterval;
    let isAnswered = false;

    const qNumTag = document.getElementById("q-num");
    const questionText = document.getElementById("question-text");
    const optionsArea = document.getElementById("options-area");
    const nextBtn = document.getElementById("next-btn");
    const timerTag = document.getElementById("timer");
    const liveScoreTag = document.getElementById("live-score");

    function startTimer() {
        timeLeft = 30;
        timerTag.innerText = "00:" + (timeLeft < 10 ? "0" + timeLeft : timeLeft);
        timerTag.style.color = "#00f2fe";
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timerTag.innerText = "00:" + (timeLeft < 10 ? "0" + timeLeft : timeLeft);
            
            if(timeLeft <= 10) timerTag.style.color = "#ff004c"; // Red alert

            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                autoSubmit();
            }
        }, 1000);
    }

    function loadQuestion() {
        isAnswered = false;
        nextBtn.style.display = "none";
        qNumTag.innerText = currentQ + 1;
        
        let qData = quizData[currentQ];
        questionText.innerText = qData.question;
        optionsArea.innerHTML = "";

        qData.options.forEach((opt, index) => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(index, btn);
            optionsArea.appendChild(btn);
        });

        startTimer();
    }

    function selectAnswer(selectedIndex, btnElement) {
        if(isAnswered) return; // Prevent multiple clicks
        isAnswered = true;
        clearInterval(timerInterval);

        let correctIndex = quizData[currentQ].answer;
        let allBtns = optionsArea.children;

        // Show correct answer anyway
        allBtns[correctIndex].classList.add("correct");

        if(selectedIndex === correctIndex) {
            score++;
            liveScoreTag.innerText = score;
        } else {
            btnElement.classList.add("wrong");
        }

        nextBtn.style.display = "block";
    }

    function autoSubmit() {
        if(isAnswered) return;
        isAnswered = true;
        let correctIndex = quizData[currentQ].answer;
        optionsArea.children[correctIndex].classList.add("correct");
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("result-box").style.display = "block";
        
        document.getElementById("final-score").innerText = score + "/" + quizData.length;
        
        let feedback = document.getElementById("feedback-msg");
        if(score === 5) { feedback.innerText = "Exceptional! Ready for the Anudeshak Exam. 🏆"; feedback.style.color = "#00ff41"; }
        else if(score >= 3) { feedback.innerText = "Good job! A little more revision needed. 👍"; }
        else { feedback.innerText = "Critical Warning: Extensive study required. ⚠️"; feedback.style.color = "#ff004c"; }
    }

    // Start App
    loadQuestion();
</script>

</body>
</html>
