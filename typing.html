<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Tool | Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .typing-container {
            background: var(--card-bg); padding: 30px; border-radius: 12px;
            border: 1px solid var(--border-color); box-shadow: var(--shadow);
            max-width: 800px; margin: 0 auto;
        }
        .stats-header {
            display: flex; justify-content: space-between; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid var(--border-color);
        }
        .stat-box { text-align: center; }
        .stat-box h4 { color: var(--text-muted); font-size: 14px; text-transform: uppercase; }
        .stat-box span { font-size: 24px; font-weight: bold; color: var(--accent); }
        
        .text-display {
            font-size: 18px; line-height: 1.6; margin-bottom: 20px;
            padding: 15px; background: var(--bg-color); border-radius: 8px;
            border: 1px solid var(--border-color); color: var(--text-muted);
            user-select: none; min-height: 100px;
        }
        .text-display span.correct { color: #10b981; }
        .text-display span.incorrect { color: #ef4444; background: rgba(239, 68, 68, 0.2); border-radius: 3px; }
        .text-display span.active { border-bottom: 2px solid var(--accent); color: var(--text-main); }
        
        .typing-input {
            width: 100%; padding: 15px; font-size: 18px; border-radius: 8px;
            background: var(--bg-color); border: 1px solid var(--border-color);
            color: var(--text-main); outline: none; transition: 0.3s;
        }
        .typing-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        
        .reset-btn {
            display: block; width: 100%; margin-top: 20px; padding: 12px;
            background: var(--accent); color: #fff; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .reset-btn:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-code"></i> Command Center</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="typing.html" class="nav-item active"><i class="fa-solid fa-keyboard"></i> Typing Tool</a></li>
                <li><a href="tracker.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i> Tracker</a></li>
                <li><a href="focus.html" class="nav-item"><i class="fa-solid fa-stopwatch"></i> Focus Mode</a></li>
                <li><a href="quiz.html" class="nav-item"><i class="fa-solid fa-brain"></i> Quiz</a></li>
                <li><a href="notes.html" class="nav-item"><i class="fa-solid fa-book"></i> Notes</a></li>
                <li><a href="todo.html" class="nav-item"><i class="fa-solid fa-list-check"></i> To-Do</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <nav class="top-navbar">
                <button class="menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <div class="search-bar" style="color: var(--text-muted);">
                    <i class="fa-solid fa-keyboard"></i> <span style="font-size: 14px; margin-left: 5px;">Typing Speed Test</span>
                </div>
                <div class="nav-actions">
                    <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                </div>
            </nav>

            <div class="dashboard-content">
                <div class="welcome-section" style="text-align: center;">
                    <h1>Terminal Typing ⌨️</h1>
                    <p>कंप्यूटर अनुदेशक सिलेबस से जुड़े शब्द टाइप करें और अपनी स्पीड (WPM) बढ़ाएं।</p>
                </div>

                <div class="typing-container">
                    <div class="stats-header">
                        <div class="stat-box"><h4>Time Left</h4><span id="time">60</span>s</div>
                        <div class="stat-box"><h4>Speed</h4><span id="wpm">0</span> WPM</div>
                        <div class="stat-box"><h4>Accuracy</h4><span id="accuracy">100</span>%</div>
                    </div>
                    
                    <div class="text-display" id="text-display"></div>
                    
                    <input type="text" class="typing-input" id="typing-input" placeholder="टाइमर शुरू करने के लिए यहाँ टाइप करना शुरू करें..." autocomplete="off">
                    
                    <button class="reset-btn" onclick="resetTest()"><i class="fa-solid fa-rotate-right"></i> Restart Test</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        const texts = [
            "Hypertext Markup Language is the standard markup language for documents designed to be displayed in a web browser. Cascading Style Sheets is a style sheet language used for describing the presentation of a document.",
            "JavaScript is a high level, often just-in-time compiled language that conforms to the ECMAScript standard. Database management systems are software systems used to manage and manipulate data in a database.",
            "Computer network topology is the arrangement of the elements of a communication network. Network topology can be used to define or describe the arrangement of various types of telecommunication networks."
        ];

        const textDisplay = document.getElementById('text-display');
        const typingInput = document.getElementById('typing-input');
        const timeDisplay = document.getElementById('time');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');

        let timeLeft = 60;
        let timeInterval = null;
        let isTyping = false;
        let charIndex = 0;
        let mistakes = 0;

        function loadText() {
            const randomIndex = Math.floor(Math.random() * texts.length);
            textDisplay.innerHTML = '';
            texts[randomIndex].split('').forEach(char => {
                let span = `<span>${char}</span>`;
                textDisplay.innerHTML += span;
            });
            textDisplay.querySelectorAll('span')[0].classList.add('active');
            document.addEventListener('keydown', () => typingInput.focus());
        }

        function initTyping() {
            const characters = textDisplay.querySelectorAll('span');
            let typedChar = typingInput.value.split('')[charIndex];

            if (charIndex < characters.length - 1 && timeLeft > 0) {
                if (!isTyping) {
                    timeInterval = setInterval(updateTimer, 1000);
                    isTyping = true;
                }

                if (typedChar == null) {
                    if(charIndex > 0) {
                        charIndex--;
                        if (characters[charIndex].classList.contains('incorrect')) { mistakes--; }
                        characters[charIndex].classList.remove('correct', 'incorrect');
                    }
                } else {
                    if (characters[charIndex].innerText === typedChar) {
                        characters[charIndex].classList.add('correct');
                    } else {
                        mistakes++;
                        characters[charIndex].classList.add('incorrect');
                    }
                    charIndex++;
                }

                characters.forEach(span => span.classList.remove('active'));
                characters[charIndex].classList.add('active');

                let wpm = Math.round(((charIndex - mistakes) / 5) / ((60 - timeLeft) / 60));
                wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
                
                let acc = Math.round(((charIndex - mistakes) / charIndex) * 100);
                acc = acc < 0 || !acc ? 100 : acc;

                wpmDisplay.innerText = wpm;
                accuracyDisplay.innerText = acc;
            } else if (charIndex >= characters.length - 1) {
                clearInterval(timeInterval);
                typingInput.value = "";
            }
        }

        function updateTimer() {
            if (timeLeft > 0) {
                timeLeft--;
                timeDisplay.innerText = timeLeft;
            } else {
                clearInterval(timeInterval);
                typingInput.disabled = true;
            }
        }

        function resetTest() {
            loadText();
            clearInterval(timeInterval);
            timeLeft = 60;
            charIndex = mistakes = 0;
            isTyping = false;
            typingInput.value = "";
            typingInput.disabled = false;
            timeDisplay.innerText = timeLeft;
            wpmDisplay.innerText = 0;
            accuracyDisplay.innerText = 100;
        }

        typingInput.addEventListener('input', initTyping);
        loadText();
    </script>
</body>
</html>
