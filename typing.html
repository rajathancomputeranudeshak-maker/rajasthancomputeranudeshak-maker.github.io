<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Typing Tutor - Vishal Vaishnav</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: #58a6ff; margin-bottom: 5px; text-transform: uppercase; }
        .sub-title { color: #8b949e; font-size: 0.9rem; margin-bottom: 30px; }

        .container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background-color: #0d1117;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #58a6ff; }
        .stat-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; }

        /* Text Display Area */
        #text-display {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 20px;
            user-select: none;
            position: relative;
            text-align: left;
        }

        #text-display span {
            position: relative;
        }

        /* Standard Monospace Caret (High Level feel) */
        .caret {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 2px;
            height: 1.2em;
            background-color: #58a6ff;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Character Highlighting */
        .char.correct { color: #3fb950; }
        .char.incorrect { color: #f85149; background-color: rgba(248, 81, 73, 0.1); }
        .char.current { color: #58a6ff; text-decoration: underline; }

        /* Hidden Input Field (Better than standard textarea) */
        #typing-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        button {
            background-color: #238636;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.2s;
        }
        button:hover { background-color: #2ea043; transform: scale(1.05); }

        .difficulty-btns {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .difficulty-btn {
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .difficulty-btn.active {
            background-color: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
        }

    </style>
</head>
<body>

    <h1>COMMAND-LINE TYPING TUTOR</h1>
    <p class="sub-title">[ TARGET: ANUDESHAK 2026 ] [ DEVELOPER: VISHAL VAISHNAV ]</p>

    <div class="container">
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="time-left">60s</div>
                <div class="stat-label">Time</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wpm-display">00</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="accuracy-display">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>

        <div id="text-display">
            <div class="caret" id="caret"></div>
        </div>

        <input type="text" id="typing-input" autocomplete="off" autofocus>

        <button onclick="resetGame()">🔄 Reset / Next Test</button>
    </div>

    <a href="index.html" style="margin-top: 20px; color: #8b949e; text-decoration: none; font-size: 0.9rem;">← Back to Command Center</a>

<script>
    // Anudeshak Exam Relevant Texts
    const textOptions = [
        "The Central Processing Unit (CPU) is often referred to as the brain of the computer. It executes instructions.",
        "Random Access Memory (RAM) is a type of computer memory that can be accessed randomly. It is volatile.",
        "An Operating System (OS) is software that manages computer hardware and software resources.",
        "Database Management Systems (DBMS) like SQL are crucial for managing large amounts of data efficiently."
    ];

    let timer;
    let maxTime = 60;
    let timeLeft = maxTime;
    let charIndex = 0;
    let mistakes = 0;
    let isTyping = false;
    let currentText = "";

    const textDisplay = document.getElementById("text-display");
    const typingInput = document.getElementById("typing-input");
    const timeLeftTag = document.getElementById("time-left");
    const wpmTag = document.getElementById("wpm-display");
    const accuracyTag = document.getElementById("accuracy-display");

    function loadText() {
        // Pick a random text
        currentText = textOptions[Math.floor(Math.random() * textOptions.length)];
        textDisplay.innerHTML = "";
        
        // Wrap each character in a span for dynamic highlighting
        currentText.split("").forEach(char => {
            let span = `<span>${char}</span>`;
            textDisplay.innerHTML += span;
        });
        
        // Add the caret
        textDisplay.innerHTML += `<div class="caret" id="caret"></div>`;
        textDisplay.querySelectorAll("span")[0].classList.add("current");
    }

    function initTyping() {
        let chars = textDisplay.querySelectorAll("span");
        let typedChar = typingInput.value.split("")[charIndex];

        if (charIndex < chars.length && timeLeft > 0) {
            
            // Start timer on first character
            if (!isTyping) {
                timer = setInterval(initTimer, 1000);
                isTyping = true;
            }

            // Highlighting logic
            if (typedChar === null) { // Handle backspace if allowed, but high-level usually doesn't
                charIndex--; // Simplified backspace logic
                chars[charIndex].classList.remove("correct", "incorrect");
            } else {
                if (chars[charIndex].innerText === typedChar) {
                    chars[charIndex].classList.add("correct");
                } else {
                    mistakes++;
                    chars[charIndex].classList.add("incorrect");
                }
                charIndex++;
            }
            
            // Move 'current' class for underline
            chars.forEach(span => span.classList.remove("current"));
            if(charIndex < chars.length) {
                chars[charIndex].classList.add("current");
            }

            // Real-time WPM & Accuracy calculation
            let wpm = Math.round(((charIndex - mistakes) / 5) / (maxTime - timeLeft) * 60);
            wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
            wpmTag.innerText = wpm < 10 ? "0" + wpm : wpm;

            let accuracy = Math.round(((charIndex - mistakes) / charIndex) * 100);
            accuracy = isNaN(accuracy) ? 0 : accuracy;
            accuracyTag.innerText = accuracy + "%";
        }
    }

    function initTimer() {
        if (timeLeft > 0) {
            timeLeft--;
            timeLeftTag.innerText = timeLeft + "s";
        } else {
            clearInterval(timer);
            isTyping = false;
            typingInput.disabled = true;
            // Optionally: save score to local storage or show an alert
            alert(`Great Job! Final WPM: ${wpmTag.innerText}`);
        }
    }

    function resetGame() {
        clearInterval(timer);
        loadText();
        timeLeft = maxTime;
        charIndex = 0;
        mistakes = 0;
        isTyping = false;
        typingInput.value = "";
        typingInput.disabled = false;
        timeLeftTag.innerText = timeLeft + "s";
        wpmTag.innerText = "00";
        accuracyTag.innerText = "0%";
        typingInput.focus();
    }

    // Event Listeners
    typingInput.addEventListener("input", initTyping);
    textDisplay.addEventListener("click", () => typingInput.focus()); // Focus hidden input when clicked anywhere
    document.addEventListener("keydown", () => typingInput.focus()); // Focus on any keypress (High-level feel)

    // Initial load
    loadText();
    resetGame(); // Ensure everything is fresh

</script>

</body>
</html>
