<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Typing Tutor - Anudeshak 2026</title>
    <style>
        body {
            background-color: #0d1117; color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        h1 { color: #58a6ff; margin-bottom: 5px; text-transform: uppercase; text-shadow: 0 0 10px rgba(88,166,255,0.5); }
        .sub-title { color: #8b949e; font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 1px; }

        .container {
            background-color: #161b22; border: 1px solid #30363d;
            border-radius: 10px; padding: 30px; max-width: 850px; width: 95%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .stats-bar {
            display: flex; justify-content: space-between;
            background-color: #0d1117; padding: 15px 30px;
            border-radius: 8px; margin-bottom: 25px; border: 1px solid #30363d;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2.2rem; font-weight: bold; color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.3); }
        .stat-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-top: 5px; }

        /* Text Box Style */
        #text-display {
            font-size: 1.6rem; line-height: 1.8; margin-bottom: 25px;
            user-select: none; text-align: left; padding: 20px;
            background: #090d13; border-radius: 8px; border: 1px solid #21262d;
            min-height: 120px; cursor: text;
        }

        /* Letters Style */
        #text-display span {
            position: relative;
            padding: 2px 0px;
            border-radius: 2px;
            transition: 0.1s;
        }
        
        /* Correct & Incorrect Colors */
        #text-display span.correct { color: #00ff41; background: rgba(0, 255, 65, 0.1); }
        #text-display span.incorrect { color: #ff4b4b; background: rgba(255, 75, 75, 0.2); text-decoration: underline; }
        
        /* THE MOVING BLINKING CURSOR */
        #text-display span.current {
            background-color: #58a6ff;
            color: #0d1117;
            box-shadow: 0 0 10px #58a6ff;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { background-color: #58a6ff; color: #0d1117; }
            50% { background-color: transparent; color: #c9d1d9; box-shadow: none; border-bottom: 3px solid #58a6ff; }
        }

        /* Hidden Input Box */
        #typing-input { opacity: 0; position: absolute; z-index: -999; }

        button {
            background: transparent; color: #58a6ff; border: 2px solid #58a6ff;
            padding: 12px 30px; border-radius: 5px; font-size: 1rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s; width: 100%;
        }
        button:hover { background: #58a6ff; color: #0d1117; box-shadow: 0 0 15px #58a6ff; }
    </style>
</head>
<body>

    <h1>COMMAND-LINE TYPING</h1>
    <p class="sub-title">MISSION: ANUDESHAK 2026</p>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value" id="time-left">60</div><div class="stat-label">Seconds</div></div>
            <div class="stat-item"><div class="stat-value" id="wpm-display">00</div><div class="stat-label">WPM</div></div>
            <div class="stat-item"><div class="stat-value" id="accuracy-display">100</div><div class="stat-label">% Accuracy</div></div>
        </div>

        <div id="text-display" onclick="document.getElementById('typing-input').focus()"></div>

        <input type="text" id="typing-input" autocomplete="off" autofocus>
        
        <button onclick="resetGame()">🔄 REBOOT SYSTEM / NEXT TEXT</button>
    </div>
    
    <a href="index.html" style="margin-top: 20px; color: #8b949e; text-decoration: none; font-size: 0.9rem;">← TERMINATE SESSION (BACK)</a>

<script>
    // Exam Syllabus Related Text
    const textOptions = [
        "The Central Processing Unit (CPU) is the brain of the computer. It executes all instructions and processes data efficiently.",
        "Random Access Memory (RAM) is temporary storage. When the computer turns off, all data stored in RAM is completely lost.",
        "An Operating System (OS) manages hardware and software. Windows, Linux, and macOS are popular operating systems.",
        "Network topology refers to the arrangement of different elements in a computer network, like star, ring, or mesh topologies."
    ];

    let timer;
    let maxTime = 60;
    let timeLeft = maxTime;
    let isTyping = false;

    const textDisplay = document.getElementById("text-display");
    const typingInput = document.getElementById("typing-input");
    const timeLeftTag = document.getElementById("time-left");
    const wpmTag = document.getElementById("wpm-display");
    const accuracyTag = document.getElementById("accuracy-display");

    // Load New Text
    function loadText() {
        let currentText = textOptions[Math.floor(Math.random() * textOptions.length)];
        textDisplay.innerHTML = "";
        
        // Har letter ko span me dalna
        currentText.split("").forEach(char => {
            let span = document.createElement("span");
            span.innerText = char;
            textDisplay.appendChild(span);
        });
        
        // Phele letter par cursor set karna
        textDisplay.querySelectorAll("span")[0].classList.add("current");
    }

    // Main Typing Logic
    typingInput.addEventListener("input", () => {
        let chars = textDisplay.querySelectorAll("span");
        let typedText = typingInput.value.split("");
        
        if (!isTyping) {
            timer = setInterval(initTimer, 1000);
            isTyping = true;
        }

        let mistakes = 0;
        
        chars.forEach((span, index) => {
            let typedChar = typedText[index];
            
            // Pura color reset
            span.classList.remove("correct", "incorrect", "current");

            // Check correct or incorrect
            if (typedChar == null) {
                // Abhi type nahi hua
            } else if (typedChar === span.innerText) {
                span.classList.add("correct");
            } else {
                span.classList.add("incorrect");
                mistakes++;
            }
        });

        // CURSOR KO AAGE BADHANA
        let currentIndex = typedText.length;
        if (currentIndex < chars.length) {
            chars[currentIndex].classList.add("current"); // Yaha cursor shift ho raha hai
        } else {
            // Text pura hone par
            clearInterval(timer);
            typingInput.value = ""; 
            alert(`Mission Passed! WPM: ${wpmTag.innerText} | Accuracy: ${accuracyTag.innerText}%`);
            resetGame();
        }

        // Live WPM aur Accuracy calculation
        let correctChars = currentIndex - mistakes;
        let wpm = Math.round(((correctChars / 5) / (maxTime - timeLeft)) * 60);
        wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
        wpmTag.innerText = wpm < 10 ? "0" + wpm : wpm;

        let accuracy = Math.round((correctChars / currentIndex) * 100);
        accuracy = isNaN(accuracy) || currentIndex === 0 ? 100 : accuracy;
        accuracyTag.innerText = accuracy;
    });

    // Timer Function
    function initTimer() {
        if (timeLeft > 0) {
            timeLeft--;
            timeLeftTag.innerText = timeLeft;
        } else {
            clearInterval(timer);
            isTyping = false;
            typingInput.disabled = true;
            alert(`Time Over! Final WPM: ${wpmTag.innerText}`);
        }
    }

    // Reset Function
    function resetGame() {
        clearInterval(timer);
        loadText();
        timeLeft = maxTime;
        isTyping = false;
        typingInput.value = "";
        typingInput.disabled = false;
        timeLeftTag.innerText = timeLeft;
        wpmTag.innerText = "00";
        accuracyTag.innerText = "100";
        typingInput.focus();
    }

    // Kahi bhi click/type karne par input focus ho jaye
    document.addEventListener("keydown", () => typingInput.focus());
    textDisplay.addEventListener("click", () => typingInput.focus());

    // Start Game
    loadText();
</script>

</body>
</html>
