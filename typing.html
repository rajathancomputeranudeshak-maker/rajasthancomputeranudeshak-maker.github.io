<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Engine | Anudeshak OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .typing-container { background: var(--card-bg); padding: 35px; border-radius: 15px; border: 1px solid var(--border-color); box-shadow: var(--shadow); max-width: 900px; margin: 0 auto; backdrop-filter: blur(10px); }
        .time-selectors { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .time-btn { background: var(--bg-color); color: var(--text-muted); border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .time-btn.active { background: rgba(0, 242, 254, 0.1); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        .time-btn:hover { color: var(--text-main); border-color: var(--text-main); }
        .stats-header { display: flex; justify-content: space-between; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .stat-box { text-align: center; } 
        .stat-box h4 { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; } 
        .stat-box span { font-size: 28px; font-weight: 800; color: var(--accent); text-shadow: 0 0 10px rgba(0,242,254,0.3); }
        
        .text-display { font-size: 20px; line-height: 1.8; margin-bottom: 25px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid var(--border-color); color: var(--text-muted); user-select: none; max-height: 180px; overflow-y: hidden; text-align: justify; letter-spacing: 0.5px; position: relative; scroll-behavior: smooth; }
        .text-display span.correct { color: #10b981; } 
        .text-display span.incorrect { color: #ef4444; background: rgba(239, 68, 68, 0.2); border-radius: 3px; } 
        .text-display span.active { border-bottom: 2px solid var(--accent); color: var(--text-main); background: rgba(0, 242, 254, 0.1); }
        
        .typing-input { width: 100%; padding: 18px; font-size: 18px; border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--text-main); outline: none; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .typing-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2), inset 0 2px 5px rgba(0,0,0,0.5); }
        .reset-btn { display: block; width: 100%; margin-top: 25px; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .reset-btn:hover { background: var(--text-main); box-shadow: 0 0 20px rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2><i class="fa-solid fa-microchip"></i> Anudeshak OS</h2></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="typing.html" class="nav-item active"><i class="fa-solid fa-keyboard"></i> Typing Tool</a></li>
                <li><a href="tracker.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i> Tracker</a></li>
                <li><a href="focus.html" class="nav-item"><i class="fa-solid fa-stopwatch"></i> Focus Mode</a></li>
                <li><a href="quiz.html" class="nav-item"><i class="fa-solid fa-brain"></i> Flashcards & Quiz</a></li>
                <li><a href="notes.html" class="nav-item"><i class="fa-solid fa-book"></i> Smart Notes</a></li>
                <li><a href="todo.html" class="nav-item"><i class="fa-solid fa-list-check"></i> To-Do</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <nav class="top-navbar">
                <button class="menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <div style="color: var(--text-muted); font-weight: 500;"><i class="fa-solid fa-keyboard"></i> <span>Pro Typing Engine</span></div>
                <div class="nav-actions"><button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button></div>
            </nav>

            <div class="dashboard-content">
                <div class="welcome-section" style="text-align: center;">
                    <h1 style="background: linear-gradient(to right, #10b981, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Mechanical Typing ⌨️</h1>
                    <p>सिलेबस के भारी शब्द। अपनी टाइमिंग चुनें और XP कमाएं।</p>
                </div>

                <div class="typing-container">
                    <div class="time-selectors">
                        <button class="time-btn active" onclick="setTimer(60, this)">1 Min</button>
                        <button class="time-btn" onclick="setTimer(180, this)">3 Min</button>
                        <button class="time-btn" onclick="setTimer(300, this)">5 Min</button>
                    </div>

                    <div class="stats-header">
                        <div class="stat-box"><h4>Time Left</h4><span id="time">60</span>s</div>
                        <div class="stat-box"><h4>Speed</h4><span id="wpm">0</span> WPM</div>
                        <div class="stat-box"><h4>Accuracy</h4><span id="accuracy">100</span>%</div>
                    </div>
                    
                    <div class="text-display" id="text-display"></div>
                    <input type="text" class="typing-input" id="typing-input" placeholder="टाइमर शुरू करने के लिए यहाँ टाइप करना शुरू करें..." autocomplete="off" spellcheck="false">
                    <button class="reset-btn" onclick="resetTest()"><i class="fa-solid fa-rotate-right"></i> Restart Test</button>
                </div>
            </div>
        </main>
    </div>

    <audio id="type-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-mechanical-keyboard-single-keystroke-2568.mp3" preload="auto"></audio>

    <script src="script.js"></script>
    <script>
        // Data categorized by length
        const texts1Min = [
            "Network topology is the arrangement of the elements of a communication network. It is the topological structure of a network.",
            "HTML stands for HyperText Markup Language. It is the standard markup language for documents designed to be displayed in a web browser."
        ];
        const texts3Min = [
            "Computer architecture is a specification detailing how a set of software and hardware technology standards interact to form a computer system or platform. In short, computer architecture refers to how a computer system is designed and what technologies it is compatible with. System Design, Instruction Set Architecture, and Microarchitecture are the main categories.",
            "A database management system is a software package designed to define, manipulate, retrieve and manage data in a database. A DBMS generally manipulates the data itself, the data format, field names, record structure and file structure. It also defines rules to validate and manipulate this data. SQL is a standard language for storing and retrieving data."
        ];
        const texts5Min = [
            "Object-oriented programming is a programming paradigm based on the concept of objects, which can contain data and code. The data is in the form of fields, often known as attributes or properties, and the code is in the form of procedures, often known as methods. A feature of objects is that an object's own procedures can access and often modify the data fields of itself. Polymorphism and Encapsulation are main pillars of OOPs. Operating systems manage computer hardware, software resources, and provide common services for computer programs. Time-sharing operating systems schedule tasks for efficient use of the system and may also include accounting software for cost allocation of processor time, mass storage, memory, and printing services. An OS acts as an intermediary between programs and the computer hardware."
        ];

        const textDisplay = document.getElementById('text-display');
        const typingInput = document.getElementById('typing-input');
        const timeDisplay = document.getElementById('time');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const typeSound = document.getElementById('type-sound');

        let selectedTime = 60; 
        let timeLeft = selectedTime;
        let timeInterval = null;
        let isTyping = false;
        let charIndex = 0;
        let mistakes = 0;

        function setTimer(seconds, btn) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedTime = seconds;
            resetTest();
        }

        function loadText() {
            let targetArray = texts1Min;
            if(selectedTime === 180) targetArray = texts3Min;
            if(selectedTime === 300) targetArray = texts5Min;

            const randomIndex = Math.floor(Math.random() * targetArray.length);
            textDisplay.innerHTML = '';
            targetArray[randomIndex].split('').forEach(char => {
                textDisplay.innerHTML += `<span>${char}</span>`;
            });
            textDisplay.querySelectorAll('span')[0].classList.add('active');
            textDisplay.scrollTop = 0;
        }

        function playSound() {
            typeSound.currentTime = 0;
            let playPromise = typeSound.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => { /* Auto-play blocked by browser initially, will work on user input */ });
            }
        }

        function initTyping() {
            playSound();
            const characters = textDisplay.querySelectorAll('span');
            let typedChar = typingInput.value.split('')[charIndex];

            if (charIndex < characters.length - 1 && timeLeft > 0) {
                if (!isTyping) {
                    timeInterval = setInterval(updateTimer, 1000);
                    isTyping = true;
                }

                if (typedChar == null) {
                    if(charIndex > 0) {
                        charIndex--;
                        if (characters[charIndex].classList.contains('incorrect')) { mistakes--; }
                        characters[charIndex].classList.remove('correct', 'incorrect');
                    }
                } else {
                    if (characters[charIndex].innerText === typedChar) {
                        characters[charIndex].classList.add('correct');
                    } else {
                        mistakes++;
                        characters[charIndex].classList.add('incorrect');
                    }
                    charIndex++;
                }

                characters.forEach(span => span.classList.remove('active'));
                
                if(charIndex < characters.length) {
                    let activeSpan = characters[charIndex];
                    activeSpan.classList.add('active');
                    
                    // FIX: Flawless Auto-scroll logic
                    let displayHeight = textDisplay.clientHeight;
                    let spanTop = activeSpan.offsetTop;
                    let displayTop = textDisplay.offsetTop;
                    
                    textDisplay.scrollTop = (spanTop - displayTop) - (displayHeight / 2) + 20;
                }

                let timeSpent = selectedTime - timeLeft;
                let wpm = Math.round(((charIndex - mistakes) / 5) / (timeSpent / 60));
                wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
                
                let acc = Math.round(((charIndex - mistakes) / charIndex) * 100);
                acc = acc < 0 || !acc ? 100 : acc;

                wpmDisplay.innerText = wpm;
                accuracyDisplay.innerText = acc;
            } else if (charIndex >= characters.length - 1 || timeLeft <= 0) {
                finishTest();
            }
        }

        function updateTimer() {
            if (timeLeft > 0) {
                timeLeft--;
                timeDisplay.innerText = timeLeft;
            } else {
                finishTest();
            }
        }

        function finishTest() {
            clearInterval(timeInterval);
            typingInput.disabled = true;
            localStorage.setItem('anudeshak_wpm', wpmDisplay.innerText);
            alert(`टेस्ट समाप्त! स्पीड: ${wpmDisplay.innerText} WPM.`);
        }

        function resetTest() {
            loadText();
            clearInterval(timeInterval);
            timeLeft = selectedTime;
            charIndex = mistakes = 0;
            isTyping = false;
            typingInput.value = "";
            typingInput.disabled = false;
            timeDisplay.innerText = timeLeft;
            wpmDisplay.innerText = 0;
            accuracyDisplay.innerText = 100;
        }

        typingInput.addEventListener('input', initTyping);
        typingInput.addEventListener('paste', e => e.preventDefault());
        loadText();
    </script>
</body>
</html>
